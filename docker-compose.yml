version: '3'

services:
  server:
    image: judge0/judge0:1.13.0
    ports:
      - "2358:2358"
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.0
    command: ['./scripts/workers']
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: judge0
      POSTGRES_USER: judge0
      POSTGRES_DB: judge0
    restart: always

  redis:
    image: redis:6
    restart: always